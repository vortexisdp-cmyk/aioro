    <style>
        /* --- ЦВЕТОВАЯ ГАММА ИЗ ФАЙЛА INDEX(1) --- */
        :root {
            --bg-color: #0a0b14;
            --card-bg: #131526;
            --text-gold: #fbbf24;
            --text-gold-light: #fcd34d;
            --text-gold-dim: #b4965a;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --glow: rgba(59, 130, 246, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1c2e 0%, var(--bg-color) 80%);
            color: var(--text-gold);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container { max-width: 850px; margin: 0 auto; text-align: center; padding-bottom: 40px; }
        
        header { margin-bottom: 60px; position: relative; }
        
        .hero-image-container {
            position: relative; width: 100%; max-width: 900px; margin: 0 auto 30px auto;
            border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(251, 191, 36, 0.1); background-color: var(--card-bg);
        }
        .hero-image { width: 100%; height: auto; display: block; object-fit: contain; }

        /* --- УСЛУГИ (СТРУКТУРА ИЗ INDEX НУЖНО СРОЧНО) --- */
        .services { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 24px; 
            margin-bottom: 60px; 
            text-align: left; 
        }
        .service-card {
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); 
            transition: all 0.4s ease;
            position: relative; 
            overflow: hidden;
        }
        .service-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); opacity: 0; transition: opacity 0.3s;
        }
        .service-card:hover { transform: translateY(-8px); border-color: var(--accent-blue); }
        .service-card:hover::before { opacity: 1; }
        
        /* ЗАГОЛОВКИ БЕЛЫЕ КАК В ФАЙЛЕ 1 */
        .service-title { font-weight: 700; font-size: 1.25rem; margin-bottom: 12px; color: #fff; display: flex; align-items: center; gap: 10px; }
        .service-card p { color: #9ca3af; }

        /* Центрированный блок сайтов-визиток */
        .centered-service {
            grid-column: 1 / -1;
            max-width: 500px;
            margin: 0 auto;
            justify-self: center;
            text-align: center;
        }
        .centered-service .service-title { justify-content: center; }

        /* --- КАК МЫ РАБОТАЕМ --- */
        .process-section { margin-bottom: 60px; text-align: center; }
